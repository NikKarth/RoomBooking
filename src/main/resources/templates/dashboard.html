<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Dashboard</title>
    <style>
        table { border-collapse: collapse; width: 100%; margin-top: 20px; }
        th, td { border: 1px solid #ccc; padding: 8px; text-align: left; }
        th { background-color: #f2f2f2; }
        .user-info { margin-bottom: 20px; padding: 10px; background-color: #e8f4fd; border-radius: 5px; }
        .logout-btn { background-color: #f44336; color: white; padding: 5px 10px; text-decoration: none; border-radius: 4px; }
    </style>
</head>
<body>

<div class="user-info" th:if="${#authentication != null}">
    <strong>Logged in as:</strong> <span th:text="${#authentication.name}"></span>
    <a href="/logout" class="logout-btn">Logout</a>
</div>

<h1>Your Booked Rooms</h1>

<table>
    <thead>
    <tr>
        <th>Name</th>
        <th>Building</th>
        <th>Room Number</th>
        <th>Date</th>
        <th>Start Time</th>
        <th>End Time</th>
        <th>Actions</th>
    </tr>
    </thead>

    <tbody>
    <tr th:each="booking : ${bookings}">
        <td th:text="${booking.room.name}"></td>
        <td th:text="${booking.room.building}"></td>
        <td th:text="${booking.room.roomNumber}"></td>
        <td th:text="${booking.date}"></td>
        <td th:text="${booking.startTime}"></td>
        <td th:text="${booking.endTime}"></td>
        <td>
            <form th:action="@{/bookings/delete}" method="post" style="display:inline">
                <input type="hidden" name="id" th:value="${booking.id}" />
                <button type="submit" onclick="return confirm('Delete this booking?')">Delete</button>
            </form>
        </td>
    </tr>
    </tbody>
</table>

<a href="/">Back to All Rooms</a>
<br>
<a href="/rooms/search">Search Available Rooms</a>

</body>
</html>
