<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Dashboard</title>
    <style>
        table { border-collapse: collapse; width: 100%; margin-top: 20px; }
        th, td { border: 1px solid #ccc; padding: 8px; text-align: left; }
        th { background-color: #f2f2f2; }
    </style>
</head>
<body>

<h1>Your Booked Rooms</h1>

<table>
    <thead>
    <tr>
        <th>Name</th>
        <th>Building</th>
        <th>Room Number</th>
        <th>Date</th>
        <th>Start Time</th>
        <th>End Time</th>
        <th>Actions</th>
    </tr>
    </thead>

    <tbody>
    <tr th:each="booking, iterStat : ${bookings}">
        <td th:text="${booking.room.name}"></td>
        <td th:text="${booking.room.building}"></td>
        <td th:text="${booking.room.roomNumber}"></td>
        <td th:text="${booking.date}"></td>
        <td th:text="${booking.startTime}"></td>
        <td th:text="${booking.endTime}"></td>
        <td>
            <form th:action="@{/bookings/delete}" method="post" style="display:inline">
                <input type="hidden" name="index" th:value="${iterStat.index}" />
                <button type="submit" onclick="return confirm('Delete this booking?')">Delete</button>
            </form>
        </td>
    </tr>
    </tbody>
</table>

<a href="/">Back to All Rooms</a>
<br>
<a href="/rooms/search">Search Available Rooms</a>

</body>
</html>
