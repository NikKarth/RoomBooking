<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Dashboard</title>
</head>
<body>
<h1>Dashboard</h1>
<ul>
    <li th:each="room : ${rooms}">
        <span th:text="${room.name}"></span> -
        <span th:text="${room.location}"></span> -
        <span th:text="${room.size}"></span> -
        <span th:text="${room.booked ? 'Booked' : 'Available'}"></span>
    </li>
</ul>
<a href="/">Back to Rooms</a>
</body>
</html>
