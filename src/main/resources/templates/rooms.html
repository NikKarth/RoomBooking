<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>All Rooms</title>
    <style>
        body { font-family: Arial, sans-serif; }

        .top-nav {
            background-color: #f2f2f2;
            padding: 10px;
            margin-bottom: 20px;
        }

        .top-nav a {
            margin-right: 15px;
            text-decoration: none;
            font-weight: bold;
            color: #333;
        }

        table { border-collapse: collapse; width: 100%; margin-top: 10px; }

        th, td { 
            border: 1px solid #ccc; 
            padding: 8px; 
            text-align: left; 
        }

        th { background-color: #f2f2f2; }

        th a {
            margin-left: 5px;
            color: black;
            text-decoration: none;
            font-size: 12px;
        }

        th a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="top-nav">
    <a href="/dashboard">Dashboard</a>
    <a href="/rooms/search">Search Available Rooms</a>
</div>

<h1>All Rooms</h1>

<table>
    <thead>
    <tr>
        <th>
            Name
            <a th:href="@{/rooms(sort='name', dir='asc')}">▲</a>
            <a th:href="@{/rooms(sort='name', dir='desc')}">▼</a>
        </th>
        <th>
            Building
            <a th:href="@{/rooms(sort='building', dir='asc')}">▲</a>
            <a th:href="@{/rooms(sort='building', dir='desc')}">▼</a>
        </th>
        <th>
            Room Number
            <a th:href="@{/rooms(sort='roomNumber', dir='asc')}">▲</a>
            <a th:href="@{/rooms(sort='roomNumber', dir='desc')}">▼</a>
        </th>
        <th>
            Capacity
            <a th:href="@{/rooms(sort='capacity', dir='asc')}">▲</a>
            <a th:href="@{/rooms(sort='capacity', dir='desc')}">▼</a>
        </th>
        <th>
            Whiteboard
            <a th:href="@{/rooms(sort='whiteboard', dir='asc')}">▲</a>
            <a th:href="@{/rooms(sort='whiteboard', dir='desc')}">▼</a>
        </th>
    </tr>
    </thead>

    <tbody>
    <tr th:each="room : ${rooms}">
        <td th:text="${room.name}"></td>
        <td th:text="${room.building}"></td>
        <td th:text="${room.roomNumber}"></td>
        <td th:text="${room.capacity}"></td>
        <td th:text="${room.whiteboard ? 'Yes' : 'No'}"></td>
    </tr>
    </tbody>
</table>

</body>
</html>
