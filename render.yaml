services:
  - type: web
    name: roombooking
    runtime: java
    buildCommand: ./mvnw clean package -DskipTests
    startCommand: java -jar target/roombooking-0.0.1-SNAPSHOT.jar
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: JAVA_OPTS
        value: -Xmx512m -Xms256m

  - type: pserv
    name: roombooking-db
    runtime: postgres15
    ipWhitelist: []
    databaseName: roombooking
    user: postgres
    region: oregon
